name: CI

# v9 SC-00: the complete non-secret gate (lint + unit/integration tests +
# production build + stale-bundle check) now runs on pull requests AND on
# direct pushes to main, so a commit can never appear release-green when these
# checks did not run. Browser E2E stays scheduled/on-demand (see e2e.yml) for
# cost; it does NOT gate a release. Nothing here needs secrets.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests (no secrets required)
        run: npm test

      - name: Production build
        run: npm run build:app

      # Fails when app/ was not rebuilt after app-src/ changes (stale bundle).
      - name: Stale-build detection
        run: npm run check:app-fresh
