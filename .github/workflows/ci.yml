name: CI

# Runs on pull requests only. We push straight to main, so this does NOT run
# on push (no failure emails on every commit). Tests are run locally before
# each push; open a PR if you want CI to gate a change.
on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests (no secrets required)
        run: npm test

      - name: Production build
        run: npm run build:app
